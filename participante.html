<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rondon Quiz — Participante</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
  :root {
    --red:#C8102E; --bg:#f4f6f8; --card:#ffffff; --card2:#eef0f4;
    --text:#1a1a2e; --muted:#6b6b8a;
    --green:#2ecc71; --amber:#f39c12;
    --A:#e74c3c; --B:#3498db; --C:#f1c40f; --D:#f39c12;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:1.2rem; }
  .logo { font-size:1.6rem; font-weight:900; color:var(--red); text-align:center; margin-bottom:.2rem; margin-top:.5rem; }
  .sub { color:var(--muted); font-size:.8rem; text-align:center; margin-bottom:1.5rem; }

  /* JOIN */
  #join-screen { width:100%; max-width:380px; }
  .card { background:var(--card); border-radius:16px; padding:1.5rem; border:1px solid #00000015; box-shadow:0 2px 12px rgba(0,0,0,0.07); }
  .card h2 { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:1.2rem; }
  .field { margin-bottom:1rem; }
  .field label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:.35rem; }
  .field input { width:100%; background:#f0f2f5; border:1px solid #cccccc; border-radius:8px; padding:.75rem 1rem; color:var(--text); font-size:1rem; outline:none; transition:border .2s; }
  .field input:focus { border-color:var(--red); }
  .code-inp { font-size:1.5rem; font-weight:900; letter-spacing:6px; text-align:center; text-transform:uppercase; }
  .btn { width:100%; background:var(--red); color:#fff; border:none; border-radius:10px; padding:.85rem; font-size:1rem; font-weight:700; cursor:pointer; margin-top:.5rem; transition:background .2s; }
  .btn:disabled { opacity:.5; }
  .msg { font-size:.82rem; color:var(--muted); text-align:center; margin-top:.6rem; }
  .err { color:#e74c3c; }

  /* WAIT */
  #wait-screen { display:none; text-align:center; width:100%; max-width:380px; }
  .wait-icon { font-size:3rem; margin-bottom:1rem; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .wait-name { font-size:1.3rem; font-weight:700; margin-bottom:.4rem; }
  .wait-info { color:var(--muted); font-size:.88rem; }

  /* QUIZ */
  #quiz-screen { display:none; width:100%; max-width:420px; }
  .progress-bar { height:4px; background:#00000015; border-radius:2px; margin-bottom:1rem; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .4s; }
  .q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
  .q-num { font-size:.8rem; color:var(--muted); background:var(--card); padding:.3rem .7rem; border-radius:6px; }
  .timer-wrap { display:flex; align-items:center; gap:.4rem; }
  .timer-bar-outer { width:80px; height:6px; background:#00000015; border-radius:3px; overflow:hidden; }
  .timer-bar-inner { height:100%; background:var(--amber); border-radius:3px; transition:width 1s linear, background .5s; }
  .timer-label { font-size:.8rem; color:var(--muted); min-width:24px; text-align:right; }
  .q-text { background:var(--card); border-radius:14px; padding:1.2rem; font-size:1rem; font-weight:600; text-align:center; line-height:1.4; margin-bottom:1rem; min-height:80px; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; }
  .opt { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4rem; padding:.9rem .7rem; border-radius:12px; border:2px solid; cursor:pointer; min-height:75px; font-size:.85rem; font-weight:600; text-align:center; line-height:1.3; transition:all .15s; }
  .opt:active { transform:scale(.96); }
  .opt.A { background:#e74c3c22; border-color:var(--A); }
  .opt.B { background:#3498db22; border-color:var(--B); }
  .opt.C { background:#f1c40f22; border-color:var(--C); }
  .opt.D { background:#f39c1222; border-color:var(--D); }
  .opt .let { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.8rem; flex-shrink:0; }
  .opt.A .let { background:var(--A); }
  .opt.B .let { background:var(--B); }
  .opt.C .let { background:var(--C); color:#111; }
  .opt.D .let { background:var(--D); color:#111; }
  .opt.selected { border-width:3px; filter:brightness(1.3); }
  .opt.correct { border-color:var(--green); background:#2ecc7122; filter:brightness(1.4); }
  .opt.wrong { opacity:.35; }
  .opt.disabled { pointer-events:none; }
  .feedback-bar { margin-top:.8rem; background:var(--card); border-radius:10px; padding:.8rem 1rem; font-size:.83rem; color:var(--muted); font-style:italic; line-height:1.5; min-height:40px; }
  .next-btn { width:100%; margin-top:.8rem; background:var(--green); color:#111; border:none; border-radius:10px; padding:.8rem; font-size:.95rem; font-weight:700; cursor:pointer; display:none; }

  /* RELATORIO */
  #relatorio-screen { display:none; width:100%; max-width:460px; padding-bottom:2rem; }
  .rel-header { text-align:center; margin-bottom:1.5rem; }
  .rel-score { font-size:3rem; font-weight:900; color:var(--amber); line-height:1; }
  .rel-pts { font-size:1rem; color:var(--muted); margin-bottom:.3rem; }
  .rel-acertos { font-size:1.1rem; font-weight:700; }
  .rel-title { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:1.2rem 0 .6rem; }
  .rel-item { background:var(--card); border-radius:12px; padding:.9rem 1rem; margin-bottom:.6rem; border-left:4px solid; }
  .rel-item.ok { border-color:var(--green); }
  .rel-item.nok { border-color:#e74c3c; }
  .rel-item.skip { border-color:var(--muted); }
  .rel-q { font-size:.85rem; font-weight:600; margin-bottom:.35rem; line-height:1.4; }
  .rel-resp { font-size:.78rem; color:var(--muted); margin-bottom:.2rem; }
  .rel-resp span { font-weight:600; }
  .rel-resp.ok span { color:var(--green); }
  .rel-resp.nok span { color:#e74c3c; }
  .rel-tip { font-size:.75rem; color:var(--muted); font-style:italic; margin-top:.3rem; line-height:1.4; }
  .rank-box { background:var(--card2); border-radius:12px; padding:1rem; text-align:center; margin-bottom:1rem; }
  .rank-pos { font-size:2rem; font-weight:900; color:var(--amber); }
  .rank-label { font-size:.8rem; color:var(--muted); }
</style>
</head>
<body>

<div class="logo">RONDON QUIZ</div>
<div class="sub">Qualidade &amp; Maturidade</div>

<!-- JOIN -->
<div id="join-screen">
  <div class="card">
    <h2>🎮 Entrar no Quiz</h2>
    <div class="field">
      <label>Código da Sessão</label>
      <input class="code-inp" id="inp-code" type="text" maxlength="6" placeholder="------" autocomplete="off" oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <div class="field">
      <label>Seu Nome</label>
      <input id="inp-name" type="text" maxlength="20" placeholder="Como aparecer no ranking?" autocomplete="off"/>
    </div>
    <button class="btn" id="btn-join" onclick="joinSession()">Entrar 🚀</button>
    <div class="msg" id="join-msg"></div>
  </div>
</div>

<!-- WAIT -->
<div id="wait-screen">
  <div class="wait-icon">⏳</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-info">Aguardando o quiz começar...</div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="q-header">
    <div class="q-num" id="q-num">1 / 16</div>
    <div class="timer-wrap">
      <div class="timer-bar-outer"><div class="timer-bar-inner" id="t-bar" style="width:100%"></div></div>
      <div class="timer-label" id="t-label">30s</div>
    </div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="opts"></div>
  <div class="feedback-bar" id="feedback-bar"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Próxima →</button>
</div>

<!-- RELATORIO -->
<div id="relatorio-screen">
  <div class="rel-header">
    <div style="font-size:2.5rem;margin-bottom:.5rem">📊</div>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:.3rem" id="rel-nome"></div>
    <div class="rel-score" id="rel-score">0</div>
    <div class="rel-pts">pontos</div>
    <div class="rel-acertos" id="rel-acertos"></div>
  </div>
  <div class="rank-box">
    <div class="rank-label">Sua posição no ranking</div>
    <div class="rank-pos" id="rel-rank">#?</div>
  </div>
  <div class="rel-title">Detalhes por pergunta</div>
  <div id="rel-list"></div>
</div>

<script>
const SUPABASE_URL = 'https://snkcznfvyydwjnhgybty.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNua2N6bmZ2eXlkd2puaGd5YnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODM5ODgsImV4cCI6MjA5NzI1OTk4OH0.wr7mG9pGzhn_wUie5fJ_LWddNxMXpqnFfGARZDNPkj0';

const QUESTIONS = [
  { q:"O que significa 'melhoria contínua' no dia a dia de uma loja?", opts:["Fazer uma grande reforma por ano","Corrigir problemas apenas quando o cliente reclama","Revisar e aperfeiçoar processos regularmente, mesmo quando tudo parece bem","Aumentar o quadro de funcionários todo semestre"], correct:2, time:30, tip:"Melhoria contínua é um hábito, não um evento isolado." },
  { q:"Qual é a ordem correta do ciclo PDCA?", opts:["Fazer → Planejar → Checar → Agir","Planejar → Fazer → Checar → Agir","Planejar → Checar → Fazer → Agir","Agir → Planejar → Fazer → Checar"], correct:1, time:25, tip:"PDCA: Plan, Do, Check, Act — sempre começa pelo planejamento." },
  { q:"Quem são as 'partes interessadas' (stakeholders) de uma loja de supermercado?", opts:["Apenas os clientes que compram na loja","Somente acionistas e diretoria","Clientes, colaboradores, fornecedores, comunidade e gestores","Apenas os fornecedores de produtos"], correct:2, time:30, tip:"Partes interessadas são todos que afetam ou são afetados pela organização." },
  { q:"Qual é o papel mais importante do gestor na construção de uma cultura de qualidade?", opts:["Punir rapidamente os erros da equipe","Dar o exemplo e criar um ambiente de melhoria contínua","Controlar cada passo dos colaboradores","Garantir que ninguém questione os processos estabelecidos"], correct:1, time:30, tip:"A cultura começa pela liderança — o time reproduz o que vê nos gestores." },
  { q:"Para que a equipe trabalhe alinhada com a qualidade, as metas precisam ser:", opts:["Secretas, para motivar por surpresa","Definidas apenas pela diretoria, sem comunicar ao operacional","Claras, mensuráveis e conhecidas por toda a equipe","Mudadas toda semana para manter o time alerta"], correct:2, time:25, tip:"Meta que a equipe não conhece não gera engajamento." },
  { q:"Quando uma mudança de procedimento é implementada na loja, o que deve acontecer primeiro?", opts:["Implementar imediatamente e corrigir os erros depois","Comunicar claramente a todos os envolvidos antes da mudança","Avisar apenas os líderes de setor","Aguardar o colaborador descobrir sozinho"], correct:1, time:30, tip:"Comunicação clara antes da mudança reduz erros e resistência." },
  { q:"O que é um 'processo' no contexto da gestão de qualidade?", opts:["Um formulário preenchido pelo RH","Uma reunião de equipe","Um conjunto de atividades que transforma entradas em resultados","Um relatório enviado para a diretoria"], correct:2, time:25, tip:"Processo = atividades encadeadas com entradas, saídas e responsáveis." },
  { q:"Por que é importante mapear e documentar os processos da loja?", opts:["Para deixar o trabalho mais burocrático","Para garantir que o resultado não dependa apenas de uma pessoa","Para punir quem não segue o procedimento","É uma exigência legal da Vigilância Sanitária"], correct:1, time:30, tip:"Processo documentado garante que o padrão seja mantido por qualquer colaborador." },
  { q:"O que acontece quando um processo não tem um responsável definido?", opts:["O processo funciona melhor, pois todos ajudam","A liderança assume automaticamente","Ninguém cuida e o processo tende a se deteriorar","Os clientes percebem que a qualidade melhora"], correct:2, time:25, tip:"Responsabilidade difusa é sinônimo de nenhuma responsabilidade." },
  { q:"Na sua loja, como é possível garantir que um padrão de qualidade alcançado seja mantido?", opts:["Confiar na memória dos colaboradores mais experientes","Realizar auditorias e checklists periódicos para verificar conformidade","Fazer uma reunião anual de qualidade","Esperar que o cliente reclame para identificar desvios"], correct:1, time:30, tip:"Checklists e verificações periódicas são a âncora do padrão alcançado." },
  { q:"Qual é a melhor abordagem para desenvolver a equipe em qualidade?", opts:["Treinar apenas quando ocorre um problema grave","Fazer um treinamento geral por ano e considerar suficiente","Planejar treinamentos contínuos alinhados às necessidades reais da equipe","Contratar apenas pessoas já experientes, sem precisar treinar"], correct:2, time:30, tip:"Desenvolvimento contínuo é investimento, não custo." },
  { q:"Para que servem os indicadores de desempenho (KPIs) na gestão da loja?", opts:["Para punir as lojas com pior resultado","Para medir se estamos atingindo os objetivos e identificar onde melhorar","São exigidos apenas para fins fiscais","Servem apenas para relatórios enviados à matriz"], correct:1, time:25, tip:"KPI = termômetro da operação. Sem medir, não há como melhorar." },
  { q:"O que diferencia uma equipe com cultura de melhoria contínua das demais?", opts:["Reclamam mais dos problemas para a liderança","Esperam que alguém de fora resolva os problemas","Identificam problemas, propõem soluções e aprendem com os erros","Ignoram os problemas para manter o clima positivo"], correct:2, time:30, tip:"Cultura de melhoria = protagonismo. A equipe é parte da solução." },
  { q:"Quando ocorre uma falha no processo da loja (ex: produto vencido na gôndola), qual é a abordagem correta?", opts:["Punir o responsável imediatamente","Ignorar se foi a primeira vez","Investigar a causa raiz e ajustar o processo para evitar reincidência","Aumentar a fiscalização de todos os colaboradores"], correct:2, time:30, tip:"O objetivo não é punir a pessoa, mas corrigir o processo." },
  { q:"Para que serve conhecer a missão e os valores da organização no dia a dia?", opts:["É apenas para fins de marketing e não influencia o trabalho","Orienta as decisões e comportamentos da equipe alinhados ao propósito da empresa","É obrigatório memorizar para processos seletivos","Serve somente para a diretoria definir estratégias"], correct:1, time:25, tip:"Valores vividos criam consistência — a equipe decide melhor quando entende o propósito." },
  { q:"Como a estratégia da empresa deve influenciar as decisões operacionais do gestor de loja?", opts:["Não influencia — a estratégia é coisa da diretoria","O gestor deve consultar a diretoria antes de qualquer decisão","As decisões do dia a dia devem estar alinhadas com os objetivos e valores definidos na estratégia","Estratégia só se aplica em reuniões formais"], correct:2, time:30, tip:"Estratégia boa é aquela que orienta decisões até no chão de loja." }
];

const LETTERS = ['A','B','C','D'];
let sb, sessionId, participantId, myName;
let currentQ = 0, myScore = 0, myCorrect = 0, answered = false, timerInterval;
let respostas = []; // histórico completo para relatório

function show(id) {
  ['join-screen','wait-screen','quiz-screen','relatorio-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
  document.getElementById(id).style.flexDirection = 'column';
  document.getElementById(id).style.alignItems = 'center';
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) document.getElementById('inp-code').value = code.toUpperCase();
  show('join-screen');
});

async function joinSession() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  const name = document.getElementById('inp-name').value.trim();
  const msg = document.getElementById('join-msg');
  const btn = document.getElementById('btn-join');
  if (!code || code.length < 4) { msg.textContent = 'Digite o código da sessão.'; msg.className = 'msg err'; return; }
  if (!name) { msg.textContent = 'Digite seu nome.'; msg.className = 'msg err'; return; }
  btn.disabled = true;
  msg.textContent = 'Conectando...'; msg.className = 'msg';
  try {
    const _lib = window.supabase || window.Supabase;
    sb = _lib.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: session, error: sErr } = await sb.from('quiz_sessions').select('*').eq('code', code).single();
    if (sErr || !session) throw new Error('Sessão não encontrada. Verifique o código.');
    if (session.status === 'finished') throw new Error('Esta sessão já foi encerrada.');
    sessionId = session.id;
    myName = name;
    const { data: p, error: pErr } = await sb.from('quiz_participants').insert({ session_id: sessionId, name: myName }).select().single();
    if (pErr) throw new Error('Erro ao entrar: ' + pErr.message);
    participantId = p.id;
    show('wait-screen');
    document.getElementById('wait-name').textContent = '👋 Olá, ' + myName + '!';
    listenForStart(session);
  } catch(e) {
    msg.textContent = e.message; msg.className = 'msg err'; btn.disabled = false;
  }
}

function listenForStart(session) {
  if (session.status === 'playing' || session.status === 'question') { startQuiz(); return; }
  sb.channel('sess_' + sessionId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'quiz_sessions', filter: 'id=eq.' + sessionId }, payload => {
      if (payload.new.status === 'playing' || payload.new.status === 'question') startQuiz();
      if (payload.new.status === 'finished') showRelatorio();
    }).subscribe();
}

function startQuiz() {
  currentQ = 0; myScore = 0; myCorrect = 0; respostas = [];
  show('quiz-screen');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = QUESTIONS[currentQ];
  const pct = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-bar').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt ' + LETTERS[i];
    btn.innerHTML = '<div class="let">' + LETTERS[i] + '</div><span>' + opt + '</span>';
    btn.onclick = () => submitAnswer(i);
    container.appendChild(btn);
  });

  // Timer
  clearInterval(timerInterval);
  let timeLeft = q.time;
  document.getElementById('t-label').textContent = timeLeft + 's';
  document.getElementById('t-bar').style.width = '100%';
  document.getElementById('t-bar').style.background = 'var(--amber)';

  timerInterval = setInterval(() => {
    timeLeft--;
    const pct = Math.max(0, timeLeft / q.time * 100);
    document.getElementById('t-label').textContent = timeLeft + 's';
    document.getElementById('t-bar').style.width = pct + '%';
    if (timeLeft <= 5) document.getElementById('t-bar').style.background = '#e74c3c';
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) timeOut(); }
  }, 1000);
}

function timeOut() {
  answered = true;
  disableOpts();
  const q = QUESTIONS[currentQ];
  // Marcar correta
  document.querySelectorAll('.opt')[q.correct].classList.add('correct');
  document.getElementById('feedback-bar').textContent = '⏰ Tempo esgotado! ' + q.tip;
  respostas.push({ qIdx: currentQ, answerIdx: -1, isCorrect: false, earned: 0 });
  saveAnswer(-1, false, 0);
  showNextBtn();
}

async function submitAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const q = QUESTIONS[currentQ];
  const isCorrect = idx === q.correct;
  const timeLeftPct = parseFloat(document.getElementById('t-bar').style.width) / 100;
  const earned = isCorrect ? Math.round(400 + timeLeftPct * 600) : 0;
  myScore += earned;
  if (isCorrect) myCorrect++;

  disableOpts();
  const opts = document.querySelectorAll('.opt');
  opts[idx].classList.add('selected');
  opts[q.correct].classList.add('correct');
  if (!isCorrect) opts[idx].classList.add('wrong');

  const fb = document.getElementById('feedback-bar');
  fb.textContent = (isCorrect ? '✅ Correto! +' + earned + ' pts — ' : '❌ Errou! — ') + q.tip;

  respostas.push({ qIdx: currentQ, answerIdx: idx, isCorrect, earned, optText: q.opts[idx], correctText: q.opts[q.correct] });
  saveAnswer(idx, isCorrect, earned);
  showNextBtn();
}

function disableOpts() {
  document.querySelectorAll('.opt').forEach(b => b.classList.add('disabled'));
}

function showNextBtn() {
  const btn = document.getElementById('next-btn');
  btn.style.display = 'block';
  btn.textContent = currentQ < QUESTIONS.length - 1 ? 'Próxima →' : 'Ver meu relatório 📊';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) { showRelatorio(); return; }
  loadQuestion();
}

async function saveAnswer(idx, isCorrect, earned) {
  try {
    await sb.from('quiz_answers').insert({
      session_id: sessionId, participant_id: participantId,
      question_index: currentQ, answer_index: idx,
      is_correct: isCorrect, score_earned: earned
    });
    await sb.from('quiz_participants').update({ score: myScore, correct_count: myCorrect }).eq('id', participantId);
  } catch(e) { console.warn('Save error:', e); }
}

async function showRelatorio() {
  show('relatorio-screen');
  document.getElementById('rel-nome').textContent = myName;
  document.getElementById('rel-score').textContent = myScore;
  document.getElementById('rel-acertos').textContent = myCorrect + ' de ' + QUESTIONS.length + ' acertos';

  // Ranking
  try {
    const { data } = await sb.from('quiz_participants').select('score').eq('session_id', sessionId).order('score', { ascending: false });
    if (data) {
      const pos = data.findIndex(p => p.score <= myScore) + 1;
      document.getElementById('rel-rank').textContent = '#' + pos;
    }
  } catch(e) {}

  // Detalhes por pergunta
  const list = document.getElementById('rel-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const r = respostas.find(x => x.qIdx === i);
    const div = document.createElement('div');
    let cls = 'skip', icon = '⏰';
    if (r && r.isCorrect) { cls = 'ok'; icon = '✅'; }
    else if (r && !r.isCorrect && r.answerIdx >= 0) { cls = 'nok'; icon = '❌'; }
    div.className = 'rel-item ' + cls;
    let respHtml = '';
    if (!r || r.answerIdx < 0) {
      respHtml = '<div class="rel-resp">Não respondeu — Correto: <span>' + q.opts[q.correct] + '</span></div>';
    } else if (r.isCorrect) {
      respHtml = '<div class="rel-resp ok">Sua resposta: <span>' + r.optText + '</span></div>';
    } else {
      respHtml = '<div class="rel-resp nok">Sua resposta: <span>' + r.optText + '</span></div>' +
                 '<div class="rel-resp ok">Correto: <span>' + q.opts[q.correct] + '</span></div>';
    }
    div.innerHTML = '<div class="rel-q">' + icon + ' ' + (i+1) + '. ' + q.q + '</div>' +
                    respHtml +
                    '<div class="rel-tip">💡 ' + q.tip + '</div>';
    list.appendChild(div);
  });
}
</script>
</body>
</html>
