<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Qualidade — Participante | Rondon</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red: #C8102E; --red-dark: #9e0c23;
    --bg: #0f0f1a; --card: #1a1a2e; --card2: #16213e;
    --text: #f0f0f0; --muted: #8a8aaa;
    --green: #2ecc71; --amber: #f39c12;
    --A: #e74c3c; --B: #3498db; --C: #2ecc71; --D: #f39c12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }

  .logo { font-size: 1.8rem; font-weight: 900; color: var(--red); letter-spacing: -1px; text-align: center; margin-bottom: .25rem; }
  .subtitle { color: var(--muted); font-size: .85rem; text-align: center; margin-bottom: 2rem; }

  /* JOIN */
  #join-screen { width: 100%; max-width: 380px; }
  .join-card { background: var(--card); border-radius: 16px; padding: 1.5rem; border: 1px solid #ffffff15; }
  .join-card h2 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.2rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .35rem; }
  .field input { width: 100%; background: #ffffff10; border: 1px solid #ffffff20; border-radius: 8px; padding: .75rem 1rem; color: var(--text); font-size: 1rem; outline: none; transition: border .2s; }
  .field input:focus { border-color: var(--red); }
  .field input.code { font-size: 1.5rem; font-weight: 900; letter-spacing: 6px; text-align: center; text-transform: uppercase; }
  .btn-join { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 10px; padding: .85rem; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: .5rem; }
  .btn-join:disabled { opacity: .5; }

  /* WAITING */
  #waiting-screen { display: none; text-align: center; width: 100%; max-width: 380px; }
  .wait-icon { font-size: 3rem; margin-bottom: 1rem; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .wait-name { font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
  .wait-info { color: var(--muted); font-size: .9rem; }

  /* QUESTION */
  #question-screen { display: none; width: 100%; max-width: 420px; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .q-num { font-size: .8rem; color: var(--muted); background: var(--card); padding: .3rem .7rem; border-radius: 6px; }
  .timer-bar-wrap { flex: 1; margin: 0 .75rem; height: 6px; background: #ffffff15; border-radius: 3px; overflow: hidden; }
  .timer-bar { height: 100%; background: var(--amber); border-radius: 3px; transition: width 1s linear, background .5s; }
  .q-text-box { background: var(--card); border-radius: 14px; padding: 1.2rem; font-size: 1.05rem; font-weight: 600; text-align: center; line-height: 1.4; margin-bottom: 1.2rem; min-height: 80px; display: flex; align-items: center; justify-content: center; }

  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .opt-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem; padding: 1rem .75rem; border-radius: 14px; border: 2px solid; cursor: pointer; transition: all .15s; min-height: 80px; font-size: .9rem; font-weight: 600; text-align: center; line-height: 1.3; position: relative; overflow: hidden; }
  .opt-btn:active { transform: scale(0.96); }
  .opt-btn.A { background: #e74c3c22; border-color: var(--A); }
  .opt-btn.B { background: #3498db22; border-color: var(--B); }
  .opt-btn.C { background: #2ecc7122; border-color: var(--C); }
  .opt-btn.D { background: #f39c1222; border-color: var(--D); }
  .opt-btn .letter { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: .9rem; flex-shrink: 0; }
  .opt-btn.A .letter { background: var(--A); }
  .opt-btn.B .letter { background: var(--B); }
  .opt-btn.C .letter { background: var(--C); color: #111; }
  .opt-btn.D .letter { background: var(--D); color: #111; }
  .opt-btn.selected { border-width: 3px; filter: brightness(1.3); transform: scale(1.03); }
  .opt-btn.selected::after { content: ''; position: absolute; inset: 0; background: #ffffff12; }
  .opt-btn:disabled, .opt-btn.disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
  .opt-btn.correct { border-color: var(--green); background: #2ecc7122; filter: brightness(1.4); }
  .opt-btn.wrong { opacity: .35; }

  /* FEEDBACK */
  #feedback-screen { display: none; text-align: center; width: 100%; max-width: 380px; }
  .feedback-icon { font-size: 4rem; margin-bottom: .75rem; animation: popIn .4s ease; }
  @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .feedback-title { font-size: 1.5rem; font-weight: 900; margin-bottom: .3rem; }
  .feedback-pts { font-size: 1rem; color: var(--amber); margin-bottom: .5rem; }
  .feedback-total { font-size: .85rem; color: var(--muted); }
  .feedback-tip { background: var(--card); border-radius: 10px; padding: .9rem 1rem; margin-top: 1rem; font-size: .85rem; color: var(--muted); font-style: italic; line-height: 1.5; }

  /* RANKING VIEW */
  #ranking-screen { display: none; text-align: center; width: 100%; max-width: 380px; }
  .my-rank { font-size: 2.5rem; font-weight: 900; color: var(--amber); }
  .my-rank-label { color: var(--muted); font-size: .9rem; margin-bottom: .5rem; }
  .my-total { font-size: 1.1rem; font-weight: 700; }

  /* FINISHED */
  #finished-screen { display: none; text-align: center; width: 100%; max-width: 380px; }

  .msg { color: var(--muted); font-size: .85rem; text-align: center; margin-top: .75rem; }
  .error { color: #e74c3c; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="logo">RONDON QUIZ</div>
<div class="subtitle">Qualidade &amp; Maturidade</div>

<!-- JOIN -->
<div id="join-screen">
  <div class="join-card">
    <h2>🎮 Entrar no Quiz</h2>
    <div class="field">
      <label>Código da Sessão</label>
      <input class="code" id="inp-code" type="text" maxlength="6" placeholder="------" autocomplete="off" oninput="this.value=this.value.toUpperCase()" />
    </div>
    <div class="field">
      <label>Seu Nome</label>
      <input id="inp-name" type="text" maxlength="20" placeholder="Como quer aparecer no ranking?" autocomplete="off" />
    </div>
    <button class="btn-join" id="btn-join" onclick="joinSession()">Entrar 🚀</button>
    <div class="msg" id="join-msg"></div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting-screen">
  <div class="wait-icon">⏳</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-info">Aguardando o quiz começar...</div>
  <div class="msg" id="wait-msg"></div>
</div>

<!-- QUESTION -->
<div id="question-screen">
  <div class="q-header">
    <div class="q-num" id="q-num">1/16</div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div class="q-num" id="timer-label">30s</div>
  </div>
  <div class="q-text-box" id="q-text">Carregando pergunta...</div>
  <div class="opts" id="opts-container"></div>
  <div class="msg" id="q-msg"></div>
</div>

<!-- FEEDBACK -->
<div id="feedback-screen">
  <div class="feedback-icon" id="fb-icon"></div>
  <div class="feedback-title" id="fb-title"></div>
  <div class="feedback-pts" id="fb-pts"></div>
  <div class="feedback-total" id="fb-total"></div>
  <div class="feedback-tip" id="fb-tip"></div>
</div>

<!-- RANKING -->
<div id="ranking-screen">
  <div style="font-size:1rem;color:var(--muted);margin-bottom:.5rem">Sua posição</div>
  <div class="my-rank" id="my-rank">#?</div>
  <div class="my-total" id="my-total"></div>
  <div class="msg">Aguardando próxima pergunta...</div>
</div>

<!-- FINISHED -->
<div id="finished-screen">
  <div style="font-size:3rem;margin-bottom:1rem">🏁</div>
  <div style="font-size:1.5rem;font-weight:900;margin-bottom:.5rem">Quiz Encerrado!</div>
  <div style="color:var(--muted);margin-bottom:1.5rem">Resultado final:</div>
  <div class="my-rank" id="final-rank">#?</div>
  <div style="font-size:1.1rem;font-weight:700;margin-top:.5rem" id="final-score"></div>
</div>

<script>
const SUPABASE_URL = 'https://snkcznfvyydwjnhgybty.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNua2N6bmZ2eXlkd2puaGd5YnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODM5ODgsImV4cCI6MjA5NzI1OTk4OH0.wr7mG9pGzhn_wUie5fJ_LWddNxMXpqnFfGARZDNPkj0';

const QUESTIONS = [
  { q: "O que significa 'melhoria contínua' no dia a dia de uma loja?", opts: ["Fazer uma grande reforma por ano","Corrigir problemas apenas quando o cliente reclama","Revisar e aperfeiçoar processos regularmente, mesmo quando tudo parece bem","Aumentar o quadro de funcionários todo semestre"], correct: 2, time: 30, tip: "Melhoria contínua é um hábito, não um evento isolado." },
  { q: "Qual é a ordem correta do ciclo PDCA?", opts: ["Fazer → Planejar → Checar → Agir","Planejar → Fazer → Checar → Agir","Planejar → Checar → Fazer → Agir","Agir → Planejar → Fazer → Checar"], correct: 1, time: 25, tip: "PDCA: Plan, Do, Check, Act — sempre começa pelo planejamento." },
  { q: "Quem são as 'partes interessadas' (stakeholders) de uma loja de supermercado?", opts: ["Apenas os clientes que compram na loja","Somente acionistas e diretoria","Clientes, colaboradores, fornecedores, comunidade e gestores","Apenas os fornecedores de produtos"], correct: 2, time: 30, tip: "Partes interessadas são todos que afetam ou são afetados pela organização." },
  { q: "Qual é o papel mais importante do gestor na construção de uma cultura de qualidade?", opts: ["Punir rapidamente os erros da equipe","Dar o exemplo e criar um ambiente de melhoria contínua","Controlar cada passo dos colaboradores","Garantir que ninguém questione os processos estabelecidos"], correct: 1, time: 30, tip: "A cultura começa pela liderança — o time reproduz o que vê nos gestores." },
  { q: "Para que a equipe trabalhe alinhada com a qualidade, as metas precisam ser:", opts: ["Secretas, para motivar por surpresa","Definidas apenas pela diretoria, sem comunicar ao operacional","Claras, mensuráveis e conhecidas por toda a equipe","Mudadas toda semana para manter o time alerta"], correct: 2, time: 25, tip: "Meta que a equipe não conhece não gera engajamento." },
  { q: "Quando uma mudança de procedimento é implementada na loja, o que deve acontecer primeiro?", opts: ["Implementar imediatamente e corrigir os erros depois","Comunicar claramente a todos os envolvidos antes da mudança","Avisar apenas os líderes de setor","Aguardar o colaborador descobrir sozinho"], correct: 1, time: 30, tip: "Comunicação clara antes da mudança reduz erros e resistência." },
  { q: "O que é um 'processo' no contexto da gestão de qualidade?", opts: ["Um formulário preenchido pelo RH","Uma reunião de equipe","Um conjunto de atividades que transforma entradas em resultados","Um relatório enviado para a diretoria"], correct: 2, time: 25, tip: "Processo = atividades encadeadas com entradas, saídas e responsáveis." },
  { q: "Por que é importante mapear e documentar os processos da loja?", opts: ["Para deixar o trabalho mais burocrático","Para garantir que o resultado não dependa apenas de uma pessoa","Para punir quem não segue o procedimento","É uma exigência legal da Vigilância Sanitária"], correct: 1, time: 30, tip: "Processo documentado garante que o padrão seja mantido por qualquer colaborador." },
  { q: "O que acontece quando um processo não tem um responsável definido?", opts: ["O processo funciona melhor, pois todos ajudam","A liderança assume automaticamente","Ninguém cuida e o processo tende a se deteriorar","Os clientes percebem que a qualidade melhora"], correct: 2, time: 25, tip: "Responsabilidade difusa é sinônimo de nenhuma responsabilidade." },
  { q: "Na sua loja, como é possível garantir que um padrão de qualidade alcançado seja mantido?", opts: ["Confiar na memória dos colaboradores mais experientes","Realizar auditorias e checklists periódicos para verificar conformidade","Fazer uma reunião anual de qualidade","Esperar que o cliente reclame para identificar desvios"], correct: 1, time: 30, tip: "Checklists e verificações periódicas são a âncora do padrão alcançado." },
  { q: "Qual é a melhor abordagem para desenvolver a equipe em qualidade?", opts: ["Treinar apenas quando ocorre um problema grave","Fazer um treinamento geral por ano e considerar suficiente","Planejar treinamentos contínuos alinhados às necessidades reais da equipe","Contratar apenas pessoas já experientes, sem precisar treinar"], correct: 2, time: 30, tip: "Desenvolvimento contínuo é investimento, não custo." },
  { q: "Para que servem os indicadores de desempenho (KPIs) na gestão da loja?", opts: ["Para punir as lojas com pior resultado","Para medir se estamos atingindo os objetivos e identificar onde melhorar","São exigidos apenas para fins fiscais","Servem apenas para relatórios enviados à matriz"], correct: 1, time: 25, tip: "KPI = termômetro da operação. Sem medir, não há como melhorar." },
  { q: "O que diferencia uma equipe com cultura de melhoria contínua das demais?", opts: ["Reclamam mais dos problemas para a liderança","Esperam que alguém de fora resolva os problemas","Identificam problemas, propõem soluções e aprendem com os erros","Ignoram os problemas para manter o clima positivo"], correct: 2, time: 30, tip: "Cultura de melhoria = protagonismo. A equipe é parte da solução." },
  { q: "Quando ocorre uma falha no processo da loja (ex: produto vencido na gôndola), qual é a abordagem correta?", opts: ["Punir o responsável imediatamente","Ignorar se foi a primeira vez","Investigar a causa raiz e ajustar o processo para evitar reincidência","Aumentar a fiscalização de todos os colaboradores"], correct: 2, time: 30, tip: "O objetivo não é punir a pessoa, mas corrigir o processo." },
  { q: "Para que serve conhecer a missão e os valores da organização no dia a dia?", opts: ["É apenas para fins de marketing e não influencia o trabalho","Orienta as decisões e comportamentos da equipe alinhados ao propósito da empresa","É obrigatório memorizar para processos seletivos","Serve somente para a diretoria definir estratégias"], correct: 1, time: 25, tip: "Valores vividos criam consistência — a equipe decide melhor quando entende o propósito." },
  { q: "Como a estratégia da empresa deve influenciar as decisões operacionais do gestor de loja?", opts: ["Não influencia — a estratégia é coisa da diretoria","O gestor deve consultar a diretoria antes de qualquer decisão","As decisões do dia a dia devem estar alinhadas com os objetivos e valores definidos na estratégia","Estratégia só se aplica em reuniões formais"], correct: 2, time: 30, tip: "Estratégia boa é aquela que orienta decisões até no chão de loja." }
];

const LETTERS = ['A','B','C','D'];
let sb, sessionId, participantId, myName, myScore = 0, myCorrect = 0, currentQ = -1, answered = false, timerInterval;

function show(id) {
  ['join-screen','waiting-screen','question-screen','feedback-screen','ranking-screen','finished-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
  document.getElementById(id).style.flexDirection = 'column';
  document.getElementById(id).style.alignItems = 'center';
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) document.getElementById('inp-code').value = code.toUpperCase();
  show('join-screen');
});

async function joinSession() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  const name = document.getElementById('inp-name').value.trim();
  const msg = document.getElementById('join-msg');
  const btn = document.getElementById('btn-join');
  if (!code || code.length < 4) { msg.textContent = 'Digite o código da sessão.'; msg.className = 'msg error'; return; }
  if (!name) { msg.textContent = 'Digite seu nome.'; msg.className = 'msg error'; return; }

  btn.disabled = true;
  msg.textContent = 'Conectando...'; msg.className = 'msg';

  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: session, error: sErr } = await sb.from('quiz_sessions').select('*').eq('code', code).single();
    if (sErr || !session) throw new Error('Sessão não encontrada. Verifique o código.');
    if (session.status === 'finished') throw new Error('Esta sessão já foi encerrada.');

    sessionId = session.id;
    myName = name;

    const { data: participant, error: pErr } = await sb.from('quiz_participants').insert({ session_id: sessionId, name: myName }).select().single();
    if (pErr) throw new Error('Erro ao entrar: ' + pErr.message);
    participantId = participant.id;

    show('waiting-screen');
    document.getElementById('wait-name').textContent = '👋 Olá, ' + myName + '!';
    listenForStart(session);
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'msg error';
    btn.disabled = false;
  }
}

function listenForStart(initialSession) {
  if (initialSession.status === 'question' || initialSession.status === 'playing') {
    handleSessionUpdate(initialSession);
  }

  sb.channel('session_' + sessionId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'quiz_sessions', filter: 'id=eq.' + sessionId }, payload => {
      handleSessionUpdate(payload.new);
    }).subscribe();
}

function handleSessionUpdate(session) {
  if (session.status === 'finished') { showFinished(); return; }
  if (session.status === 'question' || session.status === 'playing') {
    const qIdx = session.current_question;
    if (qIdx !== currentQ && qIdx >= 0 && qIdx < QUESTIONS.length) {
      currentQ = qIdx;
      answered = false;
      loadQuestion(qIdx, session.question_start);
    }
  }
}

function loadQuestion(idx, startISO) {
  const q = QUESTIONS[idx];
  show('question-screen');
  document.getElementById('q-num').textContent = `${idx+1}/${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-msg').textContent = '';

  const container = document.getElementById('opts-container');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `opt-btn ${LETTERS[i]}`;
    btn.id = `opt-${i}`;
    btn.innerHTML = `<div class="letter">${LETTERS[i]}</div><span>${opt}</span>`;
    btn.onclick = () => submitAnswer(i);
    container.appendChild(btn);
  });

  // Timer
  clearInterval(timerInterval);
  let elapsed = 0;
  if (startISO) { elapsed = Math.min(q.time, Math.floor((Date.now() - new Date(startISO).getTime()) / 1000)); }
  let timeLeft = Math.max(0, q.time - elapsed);
  document.getElementById('timer-label').textContent = timeLeft + 's';
  document.getElementById('timer-bar').style.width = (timeLeft / q.time * 100) + '%';
  document.getElementById('timer-bar').style.background = timeLeft > 10 ? '#f39c12' : '#e74c3c';

  timerInterval = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 1);
    document.getElementById('timer-label').textContent = timeLeft + 's';
    const pct = timeLeft / q.time * 100;
    document.getElementById('timer-bar').style.width = pct + '%';
    document.getElementById('timer-bar').style.background = timeLeft > 10 ? '#f39c12' : '#e74c3c';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) { document.getElementById('q-msg').textContent = 'Tempo esgotado!'; disableOptions(); }
    }
  }, 1000);
}

async function submitAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q = QUESTIONS[currentQ];
  const isCorrect = idx === q.correct;
  const timeBar = document.getElementById('timer-bar');
  const timeLeftPct = parseFloat(timeBar.style.width) / 100;
  const timeBonus = Math.round(timeLeftPct * 600);
  const baseScore = isCorrect ? 400 : 0;
  const earned = isCorrect ? baseScore + timeBonus : 0;

  myScore += earned;
  if (isCorrect) myCorrect++;

  // Disable all buttons
  disableOptions();
  document.getElementById(`opt-${idx}`).classList.add('selected');

  // Save to DB
  try {
    await sb.from('quiz_answers').insert({
      session_id: sessionId,
      participant_id: participantId,
      question_index: currentQ,
      answer_index: idx,
      is_correct: isCorrect,
      score_earned: earned,
      time_remaining_pct: Math.round(timeLeftPct * 100)
    });
  } catch(e) { console.warn('Save error:', e); }

  // Update participant score
  try {
    await sb.from('quiz_participants').update({ score: myScore, correct_count: myCorrect }).eq('id', participantId);
  } catch(e) {}

  // Show feedback
  setTimeout(() => showFeedback(isCorrect, earned, q), 400);
}

function disableOptions() {
  document.querySelectorAll('.opt-btn').forEach(b => { b.classList.add('disabled'); b.disabled = true; });
}

function showFeedback(isCorrect, earned, q) {
  show('feedback-screen');
  document.getElementById('fb-icon').textContent = isCorrect ? '✅' : '❌';
  document.getElementById('fb-title').textContent = isCorrect ? 'Correto!' : 'Errou!';
  document.getElementById('fb-title').style.color = isCorrect ? '#2ecc71' : '#e74c3c';
  document.getElementById('fb-pts').textContent = earned > 0 ? `+${earned} pontos` : '0 pontos';
  document.getElementById('fb-total').textContent = `Total: ${myScore} pts • ${myCorrect} acertos`;
  document.getElementById('fb-tip').textContent = '💡 ' + q.tip;

  // Show ranking after feedback
  setTimeout(() => showMyRanking(), 2500);
}

async function showMyRanking() {
  show('ranking-screen');
  try {
    const { data } = await sb.from('quiz_participants').select('score').eq('session_id', sessionId).order('score', { ascending: false });
    if (data) {
      const pos = data.findIndex(p => p.score <= myScore);
      const rank = pos >= 0 ? pos + 1 : data.length;
      document.getElementById('my-rank').textContent = `#${rank}`;
      document.getElementById('my-total').textContent = `${myScore} pts • ${myCorrect}/${currentQ+1} acertos`;
    }
  } catch(e) {}
}

function showFinished() {
  clearInterval(timerInterval);
  show('finished-screen');
  document.getElementById('final-score').textContent = `${myScore} pts • ${myCorrect}/${QUESTIONS.length} acertos`;
  sb.from('quiz_participants').select('score').eq('session_id', sessionId).order('score', { ascending: false }).then(({ data }) => {
    if (data) {
      const pos = data.findIndex(p => p.score <= myScore);
      document.getElementById('final-rank').textContent = `#${pos >= 0 ? pos + 1 : data.length}`;
    }
  });
}

show('join-screen');
</script>
</body>
</html>
